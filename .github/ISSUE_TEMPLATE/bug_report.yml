name: Bug Report
description: Report incorrect or unexpected generator output
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.
        Include a minimal `schema.prisma` snippet and the generated output that differs from what you expect.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what went wrong.
    validations:
      required: true
  - type: textarea
    id: schema
    attributes:
      label: Minimal schema.prisma
      description: The smallest Prisma schema (and optional configFile snippet) that reproduces the issue.
      render: prisma
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual output
      description: The generated file(s) or error message you get today.
      render: typescript
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected output
      description: What you expected the generator to emit instead.
      render: typescript
    validations:
      required: true
  - type: input
    id: package_version
    attributes:
      label: Package version
      description: Which version of `@tommasomeli/prisma-generator-nestjs-dto` are you using?
      placeholder: e.g. 0.1.0 or commit hash
    validations:
      required: true
  - type: input
    id: prisma_version
    attributes:
      label: Prisma version
      description: Output of `npx prisma --version`.
      placeholder: e.g. 6.0.0
    validations:
      required: true
  - type: input
    id: node_version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: e.g. v20.19.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Terminal output or stack trace
      description: Paste any relevant `npx prisma generate` output here.
      render: shell
    validations:
      required: false
