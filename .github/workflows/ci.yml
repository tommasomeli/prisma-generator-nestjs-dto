name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        name: test (node ${{ matrix.node }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node: ['18', '20', '22']

        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  version: 10
            - uses: actions/setup-node@v6
              if: ${{ hashFiles('pnpm-lock.yaml') == '' }}
              with:
                  node-version: ${{ matrix.node }}
            - uses: actions/setup-node@v6
              if: ${{ hashFiles('pnpm-lock.yaml') != '' }}
              with:
                  node-version: ${{ matrix.node }}
                  cache: pnpm

            - name: Install dependencies
              run: |
                  if [ -f pnpm-lock.yaml ]; then
                    pnpm install --frozen-lockfile
                  else
                    pnpm install
                  fi
            - run: pnpm lint
            - run: pnpm typecheck
            - run: pnpm build
            - run: pnpm test

    coverage:
        name: coverage (node 20)
        runs-on: ubuntu-latest
        needs: test
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  version: 10
            - uses: actions/setup-node@v6
              if: ${{ hashFiles('pnpm-lock.yaml') == '' }}
              with:
                  node-version: '20'
            - uses: actions/setup-node@v6
              if: ${{ hashFiles('pnpm-lock.yaml') != '' }}
              with:
                  node-version: '20'
                  cache: pnpm

            - name: Install dependencies
              run: |
                  if [ -f pnpm-lock.yaml ]; then
                    pnpm install --frozen-lockfile
                  else
                    pnpm install
                  fi
            - run: pnpm build
            - run: pnpm test:coverage
            - uses: actions/upload-artifact@v7
              with:
                  name: coverage-report
                  path: coverage/

    prisma-matrix:
        name: prisma ${{ matrix.prisma }} (node 20)
        runs-on: ubuntu-latest
        needs: test
        strategy:
            fail-fast: false
            matrix:
                prisma: ['5', '6', '7']
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  version: 10
            - uses: actions/setup-node@v6
              if: ${{ hashFiles('pnpm-lock.yaml') == '' }}
              with:
                  node-version: '20'
            - uses: actions/setup-node@v6
              if: ${{ hashFiles('pnpm-lock.yaml') != '' }}
              with:
                  node-version: '20'
                  cache: pnpm

            - name: Install dependencies
              run: |
                  if [ -f pnpm-lock.yaml ]; then
                    pnpm install --frozen-lockfile
                  else
                    pnpm install
                  fi
            - run: pnpm add -D prisma@^${{ matrix.prisma }} @prisma/generator-helper@^${{ matrix.prisma }}
            - run: pnpm build
            - run: pnpm test

    pack:
        name: pack + publish dry-run
        runs-on: ubuntu-latest
        needs: [test, prisma-matrix]
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  version: 10
            - uses: actions/setup-node@v6
              if: ${{ hashFiles('pnpm-lock.yaml') == '' }}
              with:
                  node-version: '20'
            - uses: actions/setup-node@v6
              if: ${{ hashFiles('pnpm-lock.yaml') != '' }}
              with:
                  node-version: '20'
                  cache: pnpm

            - name: Install dependencies
              run: |
                  if [ -f pnpm-lock.yaml ]; then
                    pnpm install --frozen-lockfile
                  else
                    pnpm install
                  fi
            - run: pnpm build
            - run: pnpm publish --dry-run --no-git-checks
            - run: |
                  MAX_KB=400
                  SIZE_BYTES=$(stat -c %s dist/index.cjs)
                  SIZE_KB=$(( (SIZE_BYTES + 1023) / 1024 ))
                  echo "dist/index.cjs is ${SIZE_KB}KB (limit ${MAX_KB}KB)"
                  if [ "$SIZE_KB" -gt "$MAX_KB" ]; then
                      echo "::error::Bundle size ${SIZE_KB}KB exceeds limit ${MAX_KB}KB"
                      exit 1
                  fi

    ci:
        name: ci
        runs-on: ubuntu-latest
        needs: [test, coverage, prisma-matrix, pack]
        steps:
            - run: echo "All CI jobs passed"
