name: Release

on:
    push:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: release-${{ github.repository }}
    cancel-in-progress: false

jobs:
    check:
        name: check version tag
        runs-on: ubuntu-latest
        outputs:
            should_release: ${{ steps.check.outputs.should_release }}
            version: ${{ steps.check.outputs.version }}
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Skip if tag already exists
              id: check
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  TAG="v${VERSION}"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
                  if git rev-parse "$TAG" >/dev/null 2>&1; then
                    echo "Tag ${TAG} already exists — skipping release."
                    echo "should_release=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "Tag ${TAG} not found — will publish @tommasomeli/prisma-generator-nestjs-dto@${VERSION}."
                    echo "should_release=true" >> "$GITHUB_OUTPUT"
                  fi

    publish:
        name: publish to npm
        runs-on: ubuntu-latest
        needs: check
        if: needs.check.outputs.should_release == 'true'
        permissions:
            contents: write
            id-token: write

        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v6
              with:
                  version: 10

            - uses: actions/setup-node@v6
              if: ${{ hashFiles('pnpm-lock.yaml') == '' }}
              with:
                  node-version: '20'
                  registry-url: https://registry.npmjs.org
            - uses: actions/setup-node@v6
              if: ${{ hashFiles('pnpm-lock.yaml') != '' }}
              with:
                  node-version: '20'
                  registry-url: https://registry.npmjs.org
                  cache: pnpm

            - name: Verify NPM_TOKEN secret
              run: |
                  if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
                      echo "::error::Missing NPM_TOKEN. Add a granular npm token under Repository → Settings → Secrets and variables → Actions."
                      exit 1
                  fi

            - name: Install dependencies
              run: |
                  if [ -f pnpm-lock.yaml ]; then
                    pnpm install --frozen-lockfile
                  else
                    pnpm install
                  fi

            - name: Typecheck
              run: pnpm typecheck

            - name: Test
              run: pnpm test

            - name: Build
              run: pnpm build

            - name: Publish to npm (with provenance)
              run: pnpm publish --access public --no-git-checks --provenance
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ needs.check.outputs.version }}
                  name: v${{ needs.check.outputs.version }}
                  generate_release_notes: true
